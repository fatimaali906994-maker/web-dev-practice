<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Details - Crumb & Crown</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #c09c83;
            color: #473021;
            margin: 0;
        }

        .navbar {
            background: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 50px auto;
            gap: 60px;
            padding: 0 20px;
        }

        .image-section img {
            width: 450px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .info-section {
            flex: 1;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        .price {
            font-size: 1.8rem;
            margin: 15px 0;
            color: #6d4c3d;
        }

        .description {
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        select,
        textarea,
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
            box-sizing: border-box;
        }



        .add-btn {
            background: #3d2b1f;
            color: white;
            border: none;
            padding: 0 40px;
            height: 45px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .logo {
            display: flex;
            align-items: center;
            /* Centers logo and text vertically */
            gap: 15px;
            /* Adds space between logo and name */
            color: #fdfaf5;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
        }

        .logo img {
            height: 45px;
            /* Adjust this height to fit your nav bar */
            width: auto;
            /* Keeps the logo proportions correct */
            object-fit: contain;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="image-section">
            <img id="p-image" src="" alt="Product">
        </div>
        <div class="info-section">
            <h1 id="p-name">Product Name</h1>
            <div class="price" id="p-price">Price</div>
            <p class="description" id="p-desc">Description</p>
            <div class="info-section">


                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 5px;">Product Highlights</h4>
                    <ul id="p-features" style="padding-left: 20px; color: #666;">
                    </ul>
                </div>

                <div style="background: #f4ece4; padding: 15px; border-radius: 8px; margin-top: 20px;">
                    <strong>Nutritional Information:</strong>
                    <p id="p-nutrition" style="font-size: 0.9rem; margin-top: 5px;"></p>
                </div>

            </div>



            <script>
                const data = JSON.parse(localStorage.getItem('selectedProduct'));
                if (data) {
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-price').innerText = data.price;
                    document.getElementById('p-image').src = data.image;
                    document.getElementById('p-desc').innerText = data.description;

                    // Populate new fields
                    document.getElementById('p-nutrition').innerText = data.nutrition;

                    const featureList = document.getElementById('p-features');
                    data.features.forEach(feature => {
                        let li = document.createElement('li');
                        li.innerText = feature;
                        featureList.appendChild(li);
                    });
                }
            </script>

</body>

</html>
